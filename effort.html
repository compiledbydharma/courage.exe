<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#070B14">
<title>Dharma Wrapped — Effort Report</title>

<!-- Google Fonts: Poppins for body copy, JetBrains Mono for stats/data -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ---------- Design tokens ---------- */
  :root{
    --bg:#070B14;
    --primary:#38BDF8;
    --primary-dark:#0EA5E9;
    --success:#22C55E;
    --gold:#FACC15;
    --text:#F8FAFC;
    --secondary:#94A3B8;
    --glass:rgba(255,255,255,0.07);
    --glass-border:rgba(56,189,248,0.25);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    min-height:100vh;
    background:radial-gradient(circle at 50% -10%, #0c1830 0%, var(--bg) 55%);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    overflow-x:hidden;
    -webkit-font-smoothing:antialiased;
  }

  .mono{ font-family:'JetBrains Mono', monospace; letter-spacing:0.02em; }

  /* ---------- Ambient background ---------- */
  .bg-layer{ position:fixed; inset:0; z-index:0; overflow:hidden; pointer-events:none; }
  .blob{ position:absolute; border-radius:50%; filter:blur(70px); will-change:transform; }
  .blob1{ width:320px; height:320px; background:var(--primary); opacity:0.16; top:-90px; left:-90px; animation:driftA 26s ease-in-out infinite; }
  .blob2{ width:280px; height:280px; background:var(--primary-dark); opacity:0.14; bottom:-110px; right:-70px; animation:driftB 30s ease-in-out infinite; }
  @keyframes driftA{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(40px,60px); } }
  @keyframes driftB{ 0%,100%{ transform:translate(0,0); } 50%{ transform:translate(-30px,-40px); } }

  .particle{
    position:absolute; bottom:-10px; border-radius:50%;
    background:radial-gradient(circle, #7dd3fc 0%, rgba(56,189,248,0) 70%);
    animation-name:floatUp; animation-timing-function:linear; animation-iteration-count:infinite;
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) scale(1); opacity:0; }
    10%{ opacity:var(--o, 0.4); }
    90%{ opacity:var(--o, 0.4); }
    100%{ transform:translateY(-110vh) scale(0.6); opacity:0; }
  }

  /* one-off confetti burst dot, spawned by JS at title reveal */
  .confetti{
    position:fixed; top:0; left:0; width:6px; height:6px; border-radius:2px;
    pointer-events:none; z-index:5; will-change:transform, opacity;
  }

  /* ---------- Layout ---------- */
  .page{ position:relative; z-index:2; display:flex; justify-content:center; padding:56px 0 90px; }

  .card{
    width:90%; max-width:430px;
    background:var(--glass);
    backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
    border:1px solid var(--glass-border);
    border-radius:25px;
    box-shadow:0 8px 32px rgba(0,0,0,0.45), 0 0 40px rgba(56,189,248,0.08);
    padding:26px 22px 24px;
    animation:cardIn 1s ease-out;
  }
  @keyframes cardIn{ from{ opacity:0; transform:translateY(14px); } to{ opacity:1; transform:translateY(0); } }

  /* ---------- Typing intro ---------- */
  .type-line{ margin:0 0 8px; line-height:1.6; font-size:0.95rem; min-height:1.5em; color:var(--secondary); }
  .type-line .cursor{
    display:inline-block; width:2px; height:1em; background:var(--primary);
    margin-left:2px; vertical-align:-2px; animation:blink 0.9s step-end infinite;
  }
  @keyframes blink{ 50%{ opacity:0; } }

  /* ---------- Generic section reveal ---------- */
  .section{ margin-top:26px; opacity:0; transform:translateY(10px); transition:opacity 0.6s ease, transform 0.6s ease; }
  .section.show{ opacity:1; transform:translateY(0); }
  .section-title{
    margin:0 0 12px; font-size:0.68rem; color:var(--secondary);
    text-transform:uppercase; letter-spacing:0.12em;
  }

  /* ---------- Title ---------- */
  .title-wrap{ text-align:center; }
  .wrapped-title{
    margin:0; font-size:1.6rem; font-weight:700; letter-spacing:0.01em;
    color:var(--text); cursor:pointer; user-select:none;
    text-shadow:0 0 24px rgba(56,189,248,0.45);
  }
  .football-egg{
    display:inline-block; margin-top:10px; font-size:1.1rem; cursor:pointer;
    animation:bob 2.4s ease-in-out infinite;
  }
  @keyframes bob{ 0%,100%{ transform:translateY(0); } 50%{ transform:translateY(-4px); } }

  /* ---------- Stat cards ---------- */
  .stat-cards{ display:flex; flex-direction:column; gap:10px; perspective:800px; }
  .stat-card{
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(255,255,255,0.09);
    border-radius:16px;
    padding:13px 15px;
    display:flex; justify-content:space-between; align-items:center; gap:10px;
    opacity:0; transform:rotateX(-80deg); transform-origin:top center;
    transition:opacity 0.55s ease, transform 0.55s ease;
  }
  .stat-card.flip-in{ opacity:1; transform:rotateX(0deg); }
  .stat-info{ display:flex; flex-direction:column; gap:2px; }
  .stat-label{ font-size:0.82rem; color:var(--text); }
  .stat-status{ font-size:0.72rem; color:var(--secondary); }
  .stat-value{
    font-family:'JetBrains Mono', monospace; font-weight:600; font-size:1.05rem;
    color:var(--primary); white-space:nowrap; text-align:right;
  }

  /* ---------- Mission panel ---------- */
  .mission-panel{
    display:flex; flex-direction:column; gap:0;
    border:1px solid rgba(255,255,255,0.09);
    border-radius:16px; overflow:hidden;
  }
  .mission-row{
    display:flex; justify-content:space-between; gap:10px;
    padding:11px 15px;
    border-bottom:1px solid rgba(255,255,255,0.06);
    opacity:0; transform:translateX(-8px);
    transition:opacity 0.5s ease, transform 0.5s ease;
  }
  .mission-row:last-child{ border-bottom:none; }
  .mission-row.show{ opacity:1; transform:translateX(0); }
  .mission-label{ font-size:0.78rem; color:var(--secondary); }
  .mission-value{ font-size:0.84rem; font-weight:500; text-align:right; }
  .mission-value.success{ color:var(--success); }

  /* ---------- Achievement badges ---------- */
  .badges{ display:flex; flex-direction:column; gap:10px; }
  .badge{
    display:flex; align-items:center; gap:12px;
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(250,204,21,0.22);
    border-radius:16px; padding:12px 14px;
    opacity:0; transform:scale(0.85);
    transition:opacity 0.45s cubic-bezier(.2,.9,.3,1.3), transform 0.45s cubic-bezier(.2,.9,.3,1.3);
  }
  .badge.pop{ opacity:1; transform:scale(1); }
  .badge-icon{
    width:38px; height:38px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-size:1.15rem;
    background:rgba(250,204,21,0.12); border:1px solid rgba(250,204,21,0.35);
  }
  .badge-title{ font-size:0.86rem; font-weight:600; margin:0; }
  .badge-reason{ font-size:0.74rem; color:var(--secondary); margin:2px 0 0; }

  /* ---------- Effort calculator ---------- */
  .calc-box{
    border:1px solid rgba(255,255,255,0.09);
    border-radius:16px; padding:16px; text-align:center;
  }
  .calc-lines{ margin-top:12px; min-height:1.4em; }
  .calc-line{
    margin:0; font-size:0.85rem; color:var(--secondary);
    opacity:0; transition:opacity 0.4s ease;
  }
  .calc-line.show{ opacity:1; }
  .calc-line.result{ color:var(--gold); font-weight:600; font-size:0.95rem; }
  .calc-progress-track{
    margin-top:10px; height:6px; border-radius:6px;
    background:rgba(255,255,255,0.08); overflow:hidden; display:none;
  }
  .calc-progress-track.show{ display:block; }
  .calc-progress-fill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--primary), var(--gold));
    transition:width 1.1s cubic-bezier(.3,.8,.4,1);
  }

  /* ---------- Fun graph ---------- */
  .graph{ display:flex; flex-direction:column; gap:14px; }
  .bar-row .bar-top{ display:flex; justify-content:space-between; font-size:0.8rem; margin-bottom:6px; }
  .bar-pct{ font-family:'JetBrains Mono', monospace; color:var(--primary); }
  .bar-track{ height:9px; border-radius:6px; background:rgba(255,255,255,0.08); overflow:hidden; }
  .bar-fill{
    height:100%; width:0%; border-radius:6px;
    background:linear-gradient(90deg, var(--primary-dark), var(--primary));
    transition:width 1.1s cubic-bezier(.3,.8,.4,1);
  }

  /* ---------- Final message ---------- */
  .final-lines{ display:flex; flex-direction:column; gap:8px; text-align:center; }
  .final-line{
    margin:0; line-height:1.6; font-size:0.96rem;
    opacity:0; transform:translateY(8px);
    transition:opacity 0.6s ease, transform 0.6s ease;
  }
  .final-line.show{ opacity:1; transform:translateY(0); }

  /* ---------- Buttons ---------- */
  .action{ margin-top:22px; display:flex; justify-content:center; }
  .btn{
    font-family:'Poppins', sans-serif;
    border:none; cursor:pointer; color:#04121F;
    background:linear-gradient(135deg, var(--primary), var(--primary-dark));
    padding:11px 22px; border-radius:999px;
    font-size:0.88rem; font-weight:600; letter-spacing:0.01em;
    box-shadow:0 0 18px rgba(56,189,248,0.35);
    opacity:0; transform:translateY(6px);
    transition:opacity 0.6s ease, transform 0.6s ease, box-shadow 0.3s ease;
  }
  .btn.show{ opacity:1; transform:translateY(0); }
  .btn:hover{ box-shadow:0 0 26px rgba(56,189,248,0.55); }
  .btn:active{ transform:scale(0.97); }
  .btn:disabled{ opacity:0.5; cursor:default; }
  .btn.final{ padding:14px 28px; font-size:0.95rem; animation:finalGlow 2.8s ease-in-out infinite; }
  @keyframes finalGlow{
    0%,100%{ box-shadow:0 0 18px rgba(56,189,248,0.35); }
    50%{ box-shadow:0 0 30px rgba(56,189,248,0.65); }
  }

  /* ---------- Toast + achievement banner ---------- */
  .toast{
    position:fixed; left:50%; bottom:28px; transform:translate(-50%, 12px);
    background:rgba(255,255,255,0.08); backdrop-filter:blur(14px);
    border:1px solid var(--glass-border); color:var(--text);
    padding:10px 16px; border-radius:14px; font-size:0.82rem; text-align:center;
    white-space:pre-line; max-width:85%;
    opacity:0; z-index:10; transition:opacity 0.4s ease, transform 0.4s ease; pointer-events:none;
  }
  .toast.show{ opacity:1; transform:translate(-50%, 0); }
  .toast.success{ border-color:rgba(34,197,94,0.4); }

  .achievement{
    position:fixed; top:16px; left:50%; transform:translate(-50%, -140%);
    background:rgba(10,14,24,0.85); backdrop-filter:blur(14px);
    border:1px solid rgba(250,204,21,0.5);
    box-shadow:0 0 24px rgba(250,204,21,0.25);
    color:var(--text); padding:12px 18px; border-radius:16px;
    font-size:0.82rem; max-width:88%; z-index:20;
    display:flex; align-items:center; gap:10px;
    transition:transform 0.5s cubic-bezier(.2,.9,.3,1.2);
  }
  .achievement.show{ transform:translate(-50%, 0); }
  .achievement .trophy{ font-size:1.2rem; }
  .achievement .label{
    display:block; font-size:0.66rem; color:var(--gold);
    text-transform:uppercase; letter-spacing:0.06em; margin-bottom:2px;
  }

  @media (prefers-reduced-motion: reduce){
    .blob, .particle, .football-egg, .btn.final, .card{ animation:none !important; }
    .section, .stat-card, .mission-row, .badge, .btn, .final-line, .calc-line, .toast, .achievement{
      transition:opacity 0.3s ease !important; transform:none !important;
    }
  }
</style>
</head>
<body>

  <div class="bg-layer" aria-hidden="true">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div id="particles"></div>
  </div>

  <div class="page">
    <div class="card">

      <!-- Typed opening -->
      <div id="intro"></div>

      <!-- Title -->
      <div class="section title-wrap" id="titleSection">
        <h1 class="wrapped-title mono" id="wrappedTitle">⚡ DHARMA WRAPPED ⚡</h1>
        <span class="football-egg" id="footballEgg" title="?">⚽</span>
      </div>

      <!-- Statistic cards -->
      <div class="section" id="statsSection">
        <p class="section-title mono">the numbers</p>
        <div class="stat-cards" id="statCards"></div>
      </div>

      <!-- Mission summary -->
      <div class="section" id="missionSection">
        <p class="section-title mono">mission summary</p>
        <div class="mission-panel" id="missionPanel"></div>
      </div>

      <!-- Achievements -->
      <div class="section" id="achievementsSection">
        <p class="section-title mono">achievements unlocked</p>
        <div class="badges" id="badges"></div>
      </div>

      <!-- Effort calculator -->
      <div class="section" id="calcSection">
        <p class="section-title mono">effort calculator</p>
        <div class="calc-box">
          <button class="btn show" id="calcBtn" style="opacity:1; transform:none;">Calculate effort</button>
          <div class="calc-progress-track" id="calcTrack"><div class="calc-progress-fill" id="calcFill"></div></div>
          <div class="calc-lines" id="calcLines"></div>
        </div>
      </div>

      <!-- Fun graph -->
      <div class="section" id="graphSection">
        <p class="section-title mono">effort breakdown</p>
        <div class="graph" id="graph"></div>
      </div>

      <!-- Final message -->
      <div class="section" id="finalMsgSection">
        <div class="final-lines" id="finalLines"></div>
      </div>

      <div class="action" id="finalAction"></div>
    </div>
  </div>

  <div class="toast" id="toast"></div>
  <div class="achievement" id="achievement">
    <span class="trophy">🔒</span>
    <span>
      <span class="label">Secret achievement</span>
      <span id="achievementText"></span>
    </span>
  </div>

  <script>
    /* =========================================================
       BACKGROUND PARTICLES
       ========================================================= */
    (function createParticles(){
      var container = document.getElementById('particles');
      var count = 26;
      for (var i = 0; i < count; i++){
        var p = document.createElement('span');
        p.className = 'particle';
        var size = Math.random() * 3 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        var duration = Math.random() * 14 + 18;
        p.style.animationDuration = duration + 's';
        p.style.animationDelay = (-Math.random() * duration) + 's';
        p.style.setProperty('--o', (Math.random() * 0.35 + 0.15).toFixed(2));
        container.appendChild(p);
      }
    })();

    /* =========================================================
       ONE-OFF CONFETTI BURST — small celebration moment
       Skipped entirely if the visitor prefers reduced motion.
       ========================================================= */
    var reduceMotion = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    function confettiBurst(){
      if (reduceMotion) return;
      var colors = ['#38BDF8', '#FACC15', '#22C55E'];
      var originX = window.innerWidth / 2;
      var originY = 140;
      for (var i = 0; i < 18; i++){
        var dot = document.createElement('span');
        dot.className = 'confetti';
        dot.style.background = colors[i % colors.length];
        dot.style.left = originX + 'px';
        dot.style.top = originY + 'px';
        document.body.appendChild(dot);

        var angle = Math.random() * Math.PI * 2;
        var distance = 60 + Math.random() * 90;
        var dx = Math.cos(angle) * distance;
        var dy = Math.sin(angle) * distance;

        dot.animate([
          { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
          { transform: 'translate(' + dx + 'px,' + dy + 'px) rotate(' + (Math.random() * 360) + 'deg)', opacity: 0 }
        ], { duration: 900 + Math.random() * 400, easing: 'cubic-bezier(.2,.8,.3,1)' });

        (function(el){ setTimeout(function(){ el.remove(); }, 1400); })(dot);
      }
    }

    /* =========================================================
       TOAST + ACHIEVEMENT HELPERS
       ========================================================= */
    var toastEl = document.getElementById('toast');
    var toastTimer = null;
    function showToast(text, kind){
      toastEl.textContent = text;
      toastEl.className = 'toast show' + (kind ? ' ' + kind : '');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function(){ toastEl.classList.remove('show'); }, 3200);
    }

    var achievementEl = document.getElementById('achievement');
    var achievementTextEl = document.getElementById('achievementText');
    var achievementTimer = null;
    function showAchievement(text){
      achievementTextEl.textContent = text;
      achievementEl.classList.add('show');
      clearTimeout(achievementTimer);
      achievementTimer = setTimeout(function(){ achievementEl.classList.remove('show'); }, 4200);
    }

    /* =========================================================
       TYPING + WAIT HELPERS
       ========================================================= */
    function typeLine(container, text, speed){
      return new Promise(function(resolve){
        var p = document.createElement('p');
        p.className = 'type-line mono';
        var span = document.createElement('span');
        var cursor = document.createElement('span');
        cursor.className = 'cursor';
        p.appendChild(span);
        p.appendChild(cursor);
        container.appendChild(p);

        var i = 0;
        var interval = setInterval(function(){
          span.textContent += text.charAt(i);
          i++;
          if (i >= text.length){
            clearInterval(interval);
            cursor.remove();
            resolve();
          }
        }, speed);
      });
    }
    function wait(ms){ return new Promise(function(resolve){ setTimeout(resolve, ms); }); }
    function revealSection(el){ el.classList.add('show'); }
    function showBtn(btn){ requestAnimationFrame(function(){ setTimeout(function(){ btn.classList.add('show'); }, 30); }); }

    /* Generic eased number counter */
    function countUp(el, to, opts){
      opts = opts || {};
      var duration = opts.duration || 1100;
      var suffix = opts.suffix || '';
      var start = null;
      function step(ts){
        if (!start) start = ts;
        var progress = Math.min((ts - start) / duration, 1);
        var eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
        var value = Math.round(eased * to);
        el.textContent = value + suffix;
        if (progress < 1){
          requestAnimationFrame(step);
        } else if (opts.onDone){
          opts.onDone();
        }
      }
      requestAnimationFrame(step);
    }

    /* =========================================================
       EASTER EGGS
       ========================================================= */
    var titleClicks = 0;
    document.getElementById('wrappedTitle').addEventListener('click', function(){
      titleClicks++;
      if (titleClicks % 5 === 0){
        showAchievement('Probably the most complicated hi ever 💀');
      }
    });
    document.getElementById('footballEgg').addEventListener('click', function(){
      showToast('Neymar would approve (probably) 🇧🇷', 'success');
    });

    /* =========================================================
       DATA
       ========================================================= */
    var statCards = [
      { label:'Lines of overthinking', to:999, suffix:'+', status:'Still increasing 💀' },
      { label:'Confidence collected', to:100, suffix:' XP', status:'Finally enough' },
      { label:'Normal conversation attempts', to:3, suffix:' failed', status:'Website became Plan B 😭' },
      { label:'Random ideas rejected', special:'cycle', finalText:'Too many', status:'Brain was working overtime' },
      { label:'Actual intention', to:1, suffix:' simple conversation', status:'Mission objective' }
    ];

    var missionRows = [
      { label:'Mission', value:'Start Conversation' },
      { label:'Difficulty', value:'Unexpectedly Extreme 💀' },
      { label:'Method chosen', value:'Create Website' },
      { label:'Logic', value:'Questionable' },
      { label:'Effort', value:'Confirmed ✔', success:true }
    ];

    var badgesData = [
      { icon:'🏆', title:'Overthinking Champion', reason:'Managed to complicate saying hi' },
      { icon:'⚡', title:'Courage Moment', reason:'Still tried anyway' },
      { icon:'💻', title:'Developer Mode', reason:'Made a website instead of typing 3 letters' },
      { icon:'😂', title:'Self Roast Ability', reason:'At least he knows this was extra' }
    ];

    var graphData = [
      { label:'Making jokes', pct:100 },
      { label:'Talking loudly', pct:100 },
      { label:'Starting this conversation', pct:30 },
      { label:'Making unnecessary website', pct:100 }
    ];

    /* =========================================================
       RENDER: STAT CARDS
       ========================================================= */
    function renderStatCards(){
      var container = document.getElementById('statCards');
      statCards.forEach(function(stat, i){
        var card = document.createElement('div');
        card.className = 'stat-card';

        var info = document.createElement('div');
        info.className = 'stat-info';
        info.innerHTML =
          '<span class="stat-label">' + stat.label + '</span>' +
          '<span class="stat-status">' + stat.status + '</span>';

        var value = document.createElement('div');
        value.className = 'stat-value';
        value.textContent = '0';

        card.appendChild(info);
        card.appendChild(value);
        container.appendChild(card);

        setTimeout(function(){
          card.classList.add('flip-in');

          if (stat.special === 'cycle'){
            // Slot-machine style cycling before settling on the joke text
            var cycles = 0;
            var cycleInterval = setInterval(function(){
              value.textContent = Math.floor(Math.random() * 9000) + 10;
              cycles++;
              if (cycles > 14){
                clearInterval(cycleInterval);
                value.textContent = stat.finalText;
              }
            }, 70);
          } else {
            countUp(value, stat.to, { suffix: stat.suffix, duration: 1000 });
          }
        }, 150 + i * 260);
      });
    }

    /* =========================================================
       RENDER: MISSION SUMMARY
       ========================================================= */
    function renderMissionPanel(){
      var container = document.getElementById('missionPanel');
      missionRows.forEach(function(row, i){
        var el = document.createElement('div');
        el.className = 'mission-row';
        el.innerHTML =
          '<span class="mission-label">' + row.label + '</span>' +
          '<span class="mission-value' + (row.success ? ' success' : '') + '">' + row.value + '</span>';
        container.appendChild(el);
        setTimeout(function(){ el.classList.add('show'); }, 120 + i * 180);
      });
    }

    /* =========================================================
       RENDER: ACHIEVEMENT BADGES
       ========================================================= */
    function renderBadges(){
      var container = document.getElementById('badges');
      badgesData.forEach(function(b, i){
        var el = document.createElement('div');
        el.className = 'badge';
        el.innerHTML =
          '<span class="badge-icon">' + b.icon + '</span>' +
          '<span>' +
            '<p class="badge-title">' + b.title + '</p>' +
            '<p class="badge-reason">Unlocked because: ' + b.reason + '</p>' +
          '</span>';
        container.appendChild(el);
        setTimeout(function(){ el.classList.add('pop'); }, 150 + i * 220);
      });
    }

    /* =========================================================
       EFFORT CALCULATOR (user-triggered, replayable)
       ========================================================= */
    function setupCalculator(){
      var btn = document.getElementById('calcBtn');
      var linesEl = document.getElementById('calcLines');
      var track = document.getElementById('calcTrack');
      var fill = document.getElementById('calcFill');

      btn.addEventListener('click', function(){
        btn.disabled = true;
        linesEl.innerHTML = '';
        fill.style.width = '0%';
        track.classList.remove('show');

        function addLine(text, cls){
          var p = document.createElement('p');
          p.className = 'calc-line' + (cls ? ' ' + cls : '');
          p.textContent = text;
          linesEl.appendChild(p);
          requestAnimationFrame(function(){ setTimeout(function(){ p.classList.add('show'); }, 20); });
          return p;
        }

        var l1 = addLine('Calculating...');
        setTimeout(function(){
          l1.remove();
          var l2 = addLine('Loading...');
          track.classList.add('show');
          requestAnimationFrame(function(){ setTimeout(function(){ fill.style.width = '100%'; }, 30); });

          setTimeout(function(){
            l2.remove();
            addLine('Effort: 101%', 'result');
            addLine('Logic: Still missing 😭');
            btn.disabled = false;
          }, 1300);
        }, 900);
      });
    }

    /* =========================================================
       RENDER: FUN GRAPH
       ========================================================= */
    function renderGraph(){
      var container = document.getElementById('graph');
      graphData.forEach(function(bar, i){
        var row = document.createElement('div');
        row.className = 'bar-row';
        row.innerHTML =
          '<div class="bar-top"><span>' + bar.label + '</span><span class="bar-pct mono" id="pct-' + i + '">0%</span></div>' +
          '<div class="bar-track"><div class="bar-fill" id="fill-' + i + '"></div></div>';
        container.appendChild(row);

        setTimeout(function(){
          var fillEl = document.getElementById('fill-' + i);
          var pctEl = document.getElementById('pct-' + i);
          fillEl.style.width = bar.pct + '%';
          countUp(pctEl, bar.pct, { suffix:'%', duration: 900 });
        }, 200 + i * 220);
      });
    }

    /* =========================================================
       FINAL MESSAGE
       ========================================================= */
    function runFinalMessage(){
      var linesEl = document.getElementById('finalLines');
      var lines = [
        'At the end...',
        'It was never about making something perfect.',
        'It was just about trying instead of wondering “what if?”'
      ];
      lines.forEach(function(text, i){
        var p = document.createElement('p');
        p.className = 'final-line';
        p.textContent = text;
        linesEl.appendChild(p);
        setTimeout(function(){
          p.classList.add('show');
          p.scrollIntoView({ behavior:'smooth', block:'end' });
        }, 250 + i * 600);
      });

      var totalDelay = 250 + lines.length * 600;
      setTimeout(function(){
        var actionEl = document.getElementById('finalAction');
        var btn = document.createElement('button');
        btn.className = 'btn final';
        btn.textContent = 'Finish this journey \u2728 \u2192';
        btn.addEventListener('click', function(){
          window.location.href = 'thankyou.html';
        });
        actionEl.appendChild(btn);
        showBtn(btn);
        btn.scrollIntoView({ behavior:'smooth', block:'end' });
      }, totalDelay + 300);
    }

    /* =========================================================
       MAIN SEQUENCE
       A "wrapped"-style chain reveal, one beat at a time.
       ========================================================= */
    function runSequence(){
      var titleSection = document.getElementById('titleSection');
      revealSection(titleSection);
      confettiBurst();

      setTimeout(function(){
        revealSection(document.getElementById('statsSection'));
        renderStatCards();
      }, 700);

      setTimeout(function(){
        revealSection(document.getElementById('missionSection'));
        renderMissionPanel();
      }, 700 + 1650);

      setTimeout(function(){
        revealSection(document.getElementById('achievementsSection'));
        renderBadges();
      }, 700 + 1650 + 1250);

      setTimeout(function(){
        revealSection(document.getElementById('calcSection'));
        setupCalculator();
      }, 700 + 1650 + 1250 + 1250);

      setTimeout(function(){
        revealSection(document.getElementById('graphSection'));
        renderGraph();
      }, 700 + 1650 + 1250 + 1250 + 700);

      setTimeout(function(){
        revealSection(document.getElementById('finalMsgSection'));
        runFinalMessage();
      }, 700 + 1650 + 1250 + 1250 + 700 + 1400);
    }

    /* =========================================================
       OPENING TYPED SEQUENCE
       ========================================================= */
    function runIntro(){
      var introEl = document.getElementById('intro');
      typeLine(introEl, 'Generating final report...', 40)
        .then(function(){ return wait(600); })
        .then(function(){ return typeLine(introEl, 'Analyzing unnecessary effort...', 38); })
        .then(function(){ return wait(600); })
        .then(function(){ return typeLine(introEl, 'Results are ready 😂', 42); })
        .then(function(){ return wait(500); })
        .then(runSequence);
    }

    runIntro();
  </script>

</body>
