<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Choose Dharma's Next Move</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#070B14;
    --accent:#38BDF8;
    --success:#22C55E;
    --warning:#FACC15;
    --error:#EF4444;
    --text:#F8FAFC;
    --text-secondary:#94A3B8;
  }

  *{ margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html, body{
    height:100%;
    background:var(--bg);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    overflow-x:hidden;
  }

  body{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    position:relative;
    padding:24px 0;
  }

  body.page-fade{ animation:pageFade 0.6s ease; }
  @keyframes pageFade{ from{ opacity:0; } to{ opacity:1; } }

  /* ---------------- BACKGROUND ---------------- */

  .bg-gradient{
    position:fixed;
    inset:-10%;
    width:120%;
    height:120%;
    background:
      radial-gradient(circle at 20% 20%, rgba(56,189,248,0.18), transparent 45%),
      radial-gradient(circle at 80% 75%, rgba(56,189,248,0.12), transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(127,92,255,0.07), transparent 60%),
      var(--bg);
    background-size:220% 220%, 220% 220%, 200% 200%, auto;
    z-index:0;
    animation:gradientPan 24s ease-in-out infinite alternate;
  }

  @keyframes gradientPan{
    0%{ background-position: 0% 0%, 100% 100%, 40% 60%, 0 0; }
    50%{ background-position: 32% 42%, 68% 60%, 58% 42%, 0 0; }
    100%{ background-position: 14% 28%, 86% 80%, 50% 50%, 0 0; }
  }

  .glow-circle{
    position:fixed;
    border-radius:50%;
    background:var(--accent);
    filter:blur(85px);
    z-index:0;
    pointer-events:none;
    will-change:transform, opacity;
  }

  .glow-circle.one{ width:260px; height:260px; top:-60px; left:-60px; animation:driftOne 18s ease-in-out infinite; }
  .glow-circle.two{ width:310px; height:310px; bottom:-100px; right:-80px; animation:driftTwo 22s ease-in-out infinite; }
  .glow-circle.three{ width:190px; height:190px; top:48%; left:60%; background:#7f5cff; animation:driftThree 27s ease-in-out infinite; }

  @keyframes driftOne{
    0%{ transform:translate(0,0) scale(1); opacity:0.15; }
    50%{ transform:translate(45px,60px) scale(1.18); opacity:0.25; }
    100%{ transform:translate(0,0) scale(1); opacity:0.15; }
  }
  @keyframes driftTwo{
    0%{ transform:translate(0,0) scale(1); opacity:0.14; }
    50%{ transform:translate(-50px,-45px) scale(1.15); opacity:0.24; }
    100%{ transform:translate(0,0) scale(1); opacity:0.14; }
  }
  @keyframes driftThree{
    0%{ transform:translate(0,0) scale(0.9); opacity:0.09; }
    50%{ transform:translate(-35px,35px) scale(1.08); opacity:0.17; }
    100%{ transform:translate(0,0) scale(0.9); opacity:0.09; }
  }

  #particles{ position:fixed; inset:0; z-index:0; pointer-events:none; }

  .particle{
    position:absolute;
    background:var(--accent);
    border-radius:50%;
    box-shadow:0 0 6px 1px rgba(56,189,248,0.6);
    animation-name:floatUp;
    animation-timing-function:ease-in-out;
    animation-iteration-count:infinite;
  }

  @keyframes floatUp{
    0%{ transform:translate(0,0) scale(0.6); opacity:0; }
    12%{ opacity:var(--maxOpacity, 0.6); }
    50%{ transform:translate(var(--sway, 20px), -55vh) scale(1); }
    88%{ opacity:var(--maxOpacity, 0.6); }
    100%{ transform:translate(calc(var(--sway, 20px) * 1.7), -115vh) scale(0.6); opacity:0; }
  }

  /* ---------------- GAME CONTAINER ---------------- */

  .card{
    position:relative;
    z-index:1;
    width:90%;
    max-width:430px;
    background:rgba(255,255,255,0.07);
    backdrop-filter:blur(20px);
    -webkit-backdrop-filter:blur(20px);
    border-radius:25px;
    border:1px solid rgba(56,189,248,0.35);
    box-shadow:0 8px 40px rgba(0,0,0,0.45), 0 0 40px rgba(56,189,248,0.08);
    padding:26px 22px;
    opacity:0;
    transform:translateY(30px);
    animation:cardIn 0.8s ease forwards 0.15s;
    max-height:85vh;
    overflow-y:auto;
  }

  @keyframes cardIn{ to{ opacity:1; transform:translateY(0); } }

  .card::-webkit-scrollbar{ width:4px; }
  .card::-webkit-scrollbar-thumb{ background:rgba(56,189,248,0.3); border-radius:4px; }

  /* ---------------- HUD ---------------- */

  .hud{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--text-secondary);
    margin-bottom:10px;
    gap:10px;
  }

  .hud-block{ display:flex; flex-direction:column; gap:2px; }
  .hud-label{ opacity:0.7; }
  .hud-value{ color:var(--text); font-weight:600; }
  #levelValue{ transition:color 0.3s ease; }

  .xp-track{
    width:100%;
    height:7px;
    border-radius:999px;
    background:rgba(255,255,255,0.08);
    overflow:hidden;
    margin-bottom:18px;
  }

  .xp-fill{
    height:100%;
    width:0%;
    border-radius:999px;
    background:linear-gradient(90deg, #38BDF8, #7f5cff);
    transition:width 1.3s cubic-bezier(.2,.8,.3,1);
  }

  /* ---------------- INTRO TYPING ---------------- */

  .typing-block{ min-height:96px; margin-bottom:6px; }

  .typing-line{
    font-size:17px;
    font-weight:500;
    line-height:1.5;
    min-height:1.4em;
  }

  .typing-line .cursor{
    display:inline-block;
    width:2px; height:1em;
    background:var(--accent);
    margin-left:2px;
    vertical-align:-2px;
    animation:blink 0.9s step-end infinite;
  }

  @keyframes blink{ 50%{ opacity:0; } }

  .difficulty-tag{
    display:inline-block;
    margin-top:8px;
    padding:6px 16px;
    border-radius:999px;
    background:rgba(239,68,68,0.12);
    border:1px solid rgba(239,68,68,0.4);
    color:var(--error);
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:13px;
    letter-spacing:0.5px;
    opacity:0;
  }

  .difficulty-tag.show{ animation:tagPulse 0.6s ease forwards; }

  @keyframes tagPulse{
    0%{ opacity:0; transform:scale(0.8); }
    60%{ opacity:1; transform:scale(1.08); }
    100%{ opacity:1; transform:scale(1); }
  }

  .subtitle{
    font-size:13px;
    color:var(--text-secondary);
    margin-top:12px;
    opacity:0;
    transition:opacity 0.6s ease;
  }
  .subtitle.show{ opacity:1; }

  /* ---------------- OPTIONS ---------------- */

  .options{
    display:flex;
    flex-direction:column;
    gap:12px;
    margin-top:20px;
  }

  .option{
    background:rgba(255,255,255,0.04);
    border:1px solid rgba(255,255,255,0.1);
    border-radius:16px;
    padding:16px;
    font-size:14.5px;
    font-weight:500;
    color:var(--text);
    text-align:left;
    cursor:pointer;
    transition:transform 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
    opacity:0;
    transform:translateY(14px);
  }

  .option.reveal{ animation:optIn 0.5s ease forwards; }
  @keyframes optIn{ to{ opacity:1; transform:translateY(0); } }

  .option:not(.disabled):hover{
    border-color:rgba(56,189,248,0.5);
    background:rgba(56,189,248,0.08);
    transform:translateY(-2px);
  }
  .option:not(.disabled):active{ transform:translateY(2px) scale(0.98); }

  .option.disabled{ cursor:default; opacity:0.4; }

  .option.selected-win{
    border-color:var(--success);
    background:rgba(34,197,94,0.12);
    box-shadow:0 0 18px rgba(34,197,94,0.25);
    opacity:1;
  }
  .option.selected-fail{
    border-color:var(--error);
    background:rgba(239,68,68,0.12);
    box-shadow:0 0 18px rgba(239,68,68,0.2);
    opacity:1;
  }

  /* ---------------- RESPONSE AREA ---------------- */

  .response{
    margin-top:18px;
    display:none;
  }
  .response.show{ display:block; animation:optIn 0.4s ease forwards; }

  .move-selected{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    color:var(--accent);
    margin-bottom:10px;
  }

  .move-selected b{ color:var(--text); font-size:14px; display:block; margin-top:2px; }

  .response-lines{ margin-bottom:12px; }
  .response-line{
    font-size:13.5px;
    color:var(--text-secondary);
    line-height:1.6;
    opacity:0;
    transform:translateY(6px);
  }
  .response-line.show{ animation:optIn 0.4s ease forwards; }

  .mini-stats{ margin:14px 0; }
  .mini-stat-row{ margin-bottom:10px; }
  .mini-stat-labels{
    display:flex; justify-content:space-between;
    font-size:12px; margin-bottom:4px; color:var(--text-secondary);
  }
  .mini-stat-track{
    width:100%; height:8px; border-radius:999px;
    background:rgba(255,255,255,0.07); overflow:hidden;
  }
  .mini-stat-fill{
    height:100%; width:0%; border-radius:999px;
    transition:width 1s cubic-bezier(.2,.8,.3,1);
  }
  .mini-stat-fill.need{ background:linear-gradient(90deg, var(--error), var(--warning)); }
  .mini-stat-fill.have{ background:linear-gradient(90deg, #38BDF8, #7f5cff); }

  .chat-bubble{
    display:inline-block;
    background:rgba(56,189,248,0.15);
    border:1px solid rgba(56,189,248,0.4);
    border-radius:14px 14px 4px 14px;
    padding:9px 14px;
    font-size:13.5px;
    margin:8px 0;
  }

  .system-line{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--text-secondary);
    margin-top:6px;
  }

  .achievement-box{
    margin:12px 0;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(250,204,21,0.08);
    border:1px solid rgba(250,204,21,0.3);
    font-size:12.5px;
    color:var(--warning);
  }

  .result-tag{
    display:inline-block;
    margin-top:6px;
    padding:6px 14px;
    border-radius:999px;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:13px;
  }
  .result-tag.fail{ color:var(--error); background:rgba(239,68,68,0.12); }
  .result-tag.badend{ color:var(--text-secondary); background:rgba(148,163,184,0.12); }
  .result-tag.win{ color:var(--success); background:rgba(34,197,94,0.12); }

  /* ---------------- TRY AGAIN ---------------- */

  .try-again-btn{
    display:none;
    width:100%;
    margin-top:16px;
    padding:13px;
    border:1px solid rgba(255,255,255,0.15);
    border-radius:14px;
    background:rgba(255,255,255,0.05);
    color:var(--text);
    font-family:'Poppins', sans-serif;
    font-weight:500;
    font-size:13.5px;
    cursor:pointer;
  }
  .try-again-btn.show{ display:block; animation:optIn 0.4s ease forwards; }
  .try-again-btn:active{ transform:scale(0.97); }

  /* ---------------- ACHIEVEMENT TOASTS ---------------- */

  .achievement-toast{
    margin-top:14px;
    padding:12px 14px;
    border-radius:14px;
    background:rgba(250,204,21,0.08);
    border:1px solid rgba(250,204,21,0.3);
    font-size:12.5px;
    color:var(--warning);
    display:none;
  }
  .achievement-toast.show{ display:block; animation:optIn 0.4s ease forwards; }

  /* ---------------- FLOATING POPUPS ---------------- */

  #popupLayer{
    position:absolute;
    left:50%;
    top:20px;
    transform:translateX(-50%);
    z-index:5;
    pointer-events:none;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  .popup{
    font-family:'JetBrains Mono', monospace;
    font-size:12.5px;
    font-weight:600;
    color:var(--accent);
    background:rgba(7,11,20,0.85);
    border:1px solid rgba(56,189,248,0.4);
    padding:6px 14px;
    border-radius:999px;
    margin-bottom:6px;
    animation:popupFloat 1.4s ease forwards;
  }

  @keyframes popupFloat{
    0%{ opacity:0; transform:translateY(6px); }
    15%{ opacity:1; transform:translateY(0); }
    80%{ opacity:1; }
    100%{ opacity:0; transform:translateY(-16px); }
  }

  /* ---------------- CONTINUE BUTTON ---------------- */

  .continue-btn{
    display:none;
    width:100%;
    margin-top:20px;
    padding:16px;
    border:none;
    border-radius:999px;
    background:linear-gradient(135deg, #38BDF8, #7DD3FC);
    color:#04141F;
    font-family:'Poppins', sans-serif;
    font-weight:600;
    font-size:14.5px;
    cursor:pointer;
    box-shadow:0 0 25px rgba(56,189,248,0.4);
  }
  .continue-btn.show{ display:block; animation:btnUnlock 0.6s ease; }
  @keyframes btnUnlock{
    0%{ transform:scale(0.85); opacity:0; }
    60%{ transform:scale(1.04); opacity:1; }
    100%{ transform:scale(1); }
  }
  .continue-btn:active{ transform:scale(0.97); }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; transition-duration:0.01ms !important; }
  }
</style>
</head>
<body class="page-fade">

<div class="bg-gradient"></div>
<div class="glow-circle one"></div>
<div class="glow-circle two"></div>
<div class="glow-circle three"></div>
<div id="particles"></div>

<div class="card" id="mainCard">

  <div id="popupLayer"></div>

  <!-- HUD -->
  <div class="hud">
    <div class="hud-block">
      <span class="hud-label">PLAYER</span>
      <span class="hud-value">Dharma</span>
    </div>
    <div class="hud-block">
      <span class="hud-label">LEVEL</span>
      <span class="hud-value" id="levelValue">Conversation Beginner</span>
    </div>
    <div class="hud-block" style="text-align:right;">
      <span class="hud-label">XP</span>
      <span class="hud-value"><span id="xpValue">0</span>/100</span>
    </div>
  </div>
  <div class="xp-track"><div class="xp-fill" id="xpFill"></div></div>

  <!-- INTRO TYPING -->
  <div class="typing-block">
    <div class="typing-line" id="typingLine"><span class="cursor"></span></div>
  </div>
  <div class="difficulty-tag" id="difficultyTag">EXTREME 💀</div>
  <div class="subtitle" id="subtitle">Choose Dharma's move...</div>

  <!-- OPTIONS -->
  <div class="options" id="options">
    <button class="option" data-option="1">🚶 Walk up and talk normally</button>
    <button class="option" data-option="2">📩 Send a simple 'hey'</button>
    <button class="option" data-option="3">🤐 Say nothing and overthink forever</button>
    <button class="option" data-option="4">💻 Create an entire website because apparently that's easier</button>
  </div>

  <!-- RESPONSE AREA -->
  <div class="response" id="response"></div>

  <button class="try-again-btn" id="tryAgainBtn">Try Again</button>

  <div class="achievement-toast" id="achievementToast"></div>

  <button class="continue-btn" id="continueBtn">Continue the story 😂 →</button>

</div>

<script>
/* ============================================================
   GAME.HTML — Page 7 of the experience
   Dharma's decision mini-game
   ============================================================ */

// ---------- Particle background ----------
(function createParticles(){
  const container = document.getElementById('particles');
  const count = 34;
  for(let i=0;i<count;i++){
    const p = document.createElement('div');
    p.className = 'particle';

    const size = 2 + Math.random()*3.5;
    const sway = (Math.random()*80 - 40).toFixed(0) + 'px';
    const maxOpacity = (0.3 + Math.random()*0.4).toFixed(2);
    const duration = 9 + Math.random()*14;
    const delay = Math.random()*duration;

    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.bottom = (Math.random()*20 - 20)+'px';
    p.style.setProperty('--sway', sway);
    p.style.setProperty('--maxOpacity', maxOpacity);
    p.style.animationDuration = duration+'s';
    p.style.animationDelay = '-' + delay + 's';

    container.appendChild(p);
  }
})();

// ---------- Typing intro ----------
const typingLine = document.getElementById('typingLine');
const difficultyTag = document.getElementById('difficultyTag');
const subtitle = document.getElementById('subtitle');
const optionsWrap = document.getElementById('options');
const optionButtons = Array.from(document.querySelectorAll('.option'));

const typingSequence = [
  { text:"MISSION UNLOCKED 🎮", pause:700 },
  { text:"Objective: Start a conversation", pause:700 },
  { text:"Difficulty selected:", pause:500 }
];

function typeText(str, cb){
  let i = 0;
  typingLine.innerHTML = '';
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  const textNode = document.createElement('span');
  typingLine.appendChild(textNode);
  typingLine.appendChild(cursor);

  const interval = setInterval(()=>{
    textNode.textContent += str.charAt(i);
    i++;
    if(i >= str.length){
      clearInterval(interval);
      if(cb) setTimeout(cb, 450);
    }
  }, 32);
}

function runTypingSequence(index){
  if(index >= typingSequence.length){
    difficultyTag.classList.add('show');
    setTimeout(()=>{
      subtitle.classList.add('show');
      revealOptions();
    }, 700);
    return;
  }
  const step = typingSequence[index];
  typeText(step.text, ()=> setTimeout(()=> runTypingSequence(index+1), step.pause));
}

function revealOptions(){
  optionButtons.forEach((btn, idx)=>{
    setTimeout(()=> btn.classList.add('reveal'), idx*120);
  });
}

setTimeout(()=> runTypingSequence(0), 400);

// ---------- HUD / XP ----------
const levelValue = document.getElementById('levelValue');
const xpValue = document.getElementById('xpValue');
const xpFill = document.getElementById('xpFill');

function grantXP(){
  xpFill.style.width = '100%';
  let current = 0;
  const counter = setInterval(()=>{
    current += 4;
    if(current >= 100){ current = 100; clearInterval(counter); }
    xpValue.textContent = current;
  }, 22);
  setTimeout(()=>{
    levelValue.textContent = 'Conversation Attempt Started';
    levelValue.style.color = 'var(--success)';
  }, 900);
}

// ---------- Floating popups ----------
const popupLayer = document.getElementById('popupLayer');

function showPopup(text){
  const el = document.createElement('div');
  el.className = 'popup';
  el.textContent = text;
  popupLayer.appendChild(el);
  setTimeout(()=> el.remove(), 1450);
}

// ---------- Response templates ----------
const response = document.getElementById('response');
const tryAgainBtn = document.getElementById('tryAgainBtn');
const continueBtn = document.getElementById('continueBtn');
const achievementToast = document.getElementById('achievementToast');

const triedWrong = new Set();
let totalAttempts = 0;
let answered = false;

function revealLines(container, lines, cb){
  lines.forEach((line, idx)=>{
    const el = document.createElement('div');
    el.className = 'response-line';
    el.textContent = line;
    container.appendChild(el);
    setTimeout(()=> el.classList.add('show'), idx*260);
  });
  if(cb) setTimeout(cb, lines.length*260 + 300);
}

function buildResponse(option){
  response.innerHTML = '';

  const moveNames = {
    1:'Direct Approach',
    2:"The classic 'hey'",
    3:'Do Nothing',
    4:'Create Website'
  };

  const moveEl = document.createElement('div');
  moveEl.className = 'move-selected';
  moveEl.innerHTML = 'Move selected:<b>' + moveNames[option] + '</b>';
  response.appendChild(moveEl);

  const linesWrap = document.createElement('div');
  linesWrap.className = 'response-lines';
  response.appendChild(linesWrap);

  if(option === '1'){
    revealLines(linesWrap, ["Usually possible...", "But system crashed this time 💀"], ()=>{
      const stats = document.createElement('div');
      stats.className = 'mini-stats';
      stats.innerHTML = `
        <div class="mini-stat-row">
          <div class="mini-stat-labels"><span>Confidence required</span><span>100%</span></div>
          <div class="mini-stat-track"><div class="mini-stat-fill need" data-target="100"></div></div>
        </div>
        <div class="mini-stat-row">
          <div class="mini-stat-labels"><span>Current confidence</span><span>20%</span></div>
          <div class="mini-stat-track"><div class="mini-stat-fill have" data-target="20"></div></div>
        </div>
      `;
      response.appendChild(stats);
      requestAnimationFrame(()=>{
        stats.querySelectorAll('.mini-stat-fill').forEach(f=>{
          setTimeout(()=> f.style.width = f.dataset.target + '%', 50);
        });
      });

      const result = document.createElement('div');
      result.className = 'result-tag fail';
      result.textContent = 'FAILED ❌';
      response.appendChild(result);

      finishWrongAttempt('1');
    });

  } else if(option === '2'){
    revealLines(linesWrap, [], ()=>{});
    const chat = document.createElement('div');
    chat.innerHTML = `
      <div class="system-line">Dharma:</div>
      <div class="chat-bubble">Hey</div>
      <div class="system-line">System: Message rejected.</div>
      <div class="system-line">Reason: "Too dry 😭"</div>
    `;
    response.appendChild(chat);

    const result = document.createElement('div');
    result.className = 'result-tag fail';
    result.textContent = 'FAILED ❌';
    response.appendChild(result);

    finishWrongAttempt('2');

  } else if(option === '3'){
    revealLines(linesWrap, [], ()=>{});
    const ach = document.createElement('div');
    ach.className = 'achievement-box';
    ach.innerHTML = 'Achievement unlocked:<br>Lifetime what-if unlocked 💀';
    response.appendChild(ach);

    const result = document.createElement('div');
    result.className = 'result-tag badend';
    result.textContent = 'BAD ENDING ❌';
    response.appendChild(result);

    finishWrongAttempt('3');

  } else if(option === '4'){
    revealLines(linesWrap, ["Analyzing...", "Normal? Probably not.", "Creative? Maybe.", "Memorable? Definitely 😂"], ()=>{
      const result = document.createElement('div');
      result.className = 'result-tag win';
      result.textContent = 'RARE ENDING UNLOCKED ✔';
      response.appendChild(result);

      grantXP();
      setTimeout(()=> continueBtn.classList.add('show'), 500);

      if(totalAttempts === 1){
        achievementToast.textContent = 'Speedrunner detected ⚡';
        achievementToast.classList.add('show');
      }
    });
  }

  response.classList.add('show');
}

function finishWrongAttempt(option){
  triedWrong.add(option);
  setTimeout(()=> tryAgainBtn.classList.add('show'), 300);

  if(triedWrong.size === 3){
    setTimeout(()=>{
      achievementToast.textContent = 'Achievement unlocked: Explored all bad endings 😭';
      achievementToast.classList.add('show');
    }, 500);
  }
}

const popupText = { '1':'+10 courage', '2':'-50 overthinking', '3':'+9000 overthinking', '4':'New path unlocked' };

function handleOptionClick(e){
  if(answered) return;
  answered = true;
  totalAttempts++;

  const btn = e.currentTarget;
  const option = btn.dataset.option;
  const isWin = option === '4';

  optionButtons.forEach(b=>{ b.classList.add('disabled'); b.disabled = true; });
  btn.classList.add(isWin ? 'selected-win' : 'selected-fail');

  showPopup(popupText[option]);

  setTimeout(()=> buildResponse(option), 500);
}

optionButtons.forEach(btn=> btn.addEventListener('click', handleOptionClick));

// ---------- Try Again ----------
tryAgainBtn.addEventListener('click', ()=>{
  response.classList.remove('show');
  response.innerHTML = '';
  tryAgainBtn.classList.remove('show');
  answered = false;

  optionButtons.forEach(b=>{
    b.classList.remove('disabled','selected-win','selected-fail');
    b.disabled = false;
  });
});

// ---------- Continue ----------
continueBtn.addEventListener('click', ()=>{
  document.body.style.transition = 'opacity 0.5s ease';
  document.body.style.opacity = '0';
  setTimeout(()=>{ window.location.href = 'simulator.html'; }, 480);
});
</script>

</body>
</html>
