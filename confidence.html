<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<title>Confidence Generator ⚡ Courage Collector</title>

<!-- Google Fonts: Poppins for main UI, JetBrains Mono for system/stats text -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  /* ============================================================
     ROOT VARIABLES — locked to the site's dark glassmorphism theme
  ============================================================ */
  :root{
    --bg: #070B14;
    --accent: #38BDF8;
    --success: #22C55E;
    --warning: #FACC15;
    --text: #F8FAFC;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(56,189,248,0.35);
  }

  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body{
    margin:0; padding:0;
    background: var(--bg);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    overflow-x: hidden;
    min-height: 100vh;
  }

  body.flash{ animation: screenFlash 0.4s ease; }
  @keyframes screenFlash{
    0%{ filter: brightness(1); }
    30%{ filter: brightness(1.6); }
    100%{ filter: brightness(1); }
  }

  /* ============================================================
     ANIMATED BACKGROUND — soft moving glow blobs + rising particles
  ============================================================ */
  .bg-gradient{
    position: fixed; inset: 0; z-index: 0; overflow: hidden; background: var(--bg);
  }
  .bg-gradient::before, .bg-gradient::after{
    content: ""; position: absolute; width: 60vmax; height: 60vmax; border-radius: 50%;
    filter: blur(90px);
  }
  .bg-gradient::before{
    background: var(--accent); opacity: 0.28; top: -25%; left: -15%;
    animation: floatBlob1 18s ease-in-out infinite;
  }
  .bg-gradient::after{
    background: var(--success); opacity: 0.14; bottom: -25%; right: -15%;
    animation: floatBlob2 22s ease-in-out infinite;
  }
  @keyframes floatBlob1{ 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(12%,10%);} }
  @keyframes floatBlob2{ 0%,100%{ transform: translate(0,0);} 50%{ transform: translate(-10%,-12%);} }

  .particles{ position: fixed; inset: 0; z-index: 1; overflow: hidden; pointer-events: none; }
  .particle{
    position: absolute; bottom: -20px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px 2px rgba(56,189,248,0.8);
    animation-name: rise; animation-timing-function: linear; animation-fill-mode: forwards;
  }
  @keyframes rise{
    0%{ transform: translateY(0) scale(1); opacity: 0; }
    10%{ opacity: 1; }
    100%{ transform: translateY(-110vh) scale(0.3); opacity: 0; }
  }

  /* ============================================================
     PAGE LAYOUT
  ============================================================ */
  .page-wrap{
    position: relative; z-index: 2;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 32px 14px;
  }

  .glass-card{
    position: relative;
    width: 90%; max-width: 430px;
    background: var(--glass);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 25px;
    border: 1px solid var(--glass-border);
    box-shadow: 0 0 45px rgba(56,189,248,0.15), 0 25px 60px rgba(0,0,0,0.55);
    padding: 26px 22px 28px;
    overflow: hidden;
    animation: cardEntrance 0.8s cubic-bezier(.22,.9,.35,1) both;
  }
  @keyframes cardEntrance{
    from{ opacity: 0; transform: translateY(30px) scale(0.96); }
    to{ opacity: 1; transform: translateY(0) scale(1); }
  }

  /* ============================================================
     INTRO TERMINAL SEQUENCE
  ============================================================ */
  .terminal{
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px;
    padding: 16px 16px 18px;
    min-height: 150px;
    transition: opacity 0.5s ease;
  }
  .terminal.fade-out{ opacity: 0; }

  .terminal-dots{ display: flex; gap: 6px; margin-bottom: 12px; }
  .terminal-dots span{ width: 10px; height: 10px; border-radius: 50%; display: inline-block; }
  .terminal-dots .red{ background: #FF5F56; }
  .terminal-dots .yellow{ background: #FFBD2E; }
  .terminal-dots .green{ background: #27C93F; }

  .terminal-body{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.8;
    color: var(--accent);
  }
  .term-line::after{
    content: "▍";
    animation: blink 1s step-end infinite;
    color: var(--accent);
  }
  .term-line:not(:last-child)::after{ content: ""; }
  @keyframes blink{ 50%{ opacity: 0; } }

  /* ============================================================
     GAME UI — hidden until intro finishes
  ============================================================ */
  .game-ui{
    opacity: 0; visibility: hidden; max-height: 0;
    transition: opacity 0.6s ease;
  }
  .game-ui.visible{ opacity: 1; visibility: visible; max-height: none; }

  .title{
    text-align: center;
    font-size: 1.4rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    margin: 2px 0 4px;
  }
  .lightning-egg{ cursor: pointer; display: inline-block; user-select: none; }
  .lightning-egg:active{ transform: scale(1.3); }

  .subtitle{
    text-align: center;
    font-size: 0.82rem;
    color: rgba(248,250,252,0.6);
    margin: 0 0 22px;
    line-height: 1.5;
  }
  .dharma-name{
    color: var(--accent);
    font-weight: 600;
    cursor: pointer;
    border-bottom: 1px dashed rgba(56,189,248,0.5);
  }

  /* ---- Circular ring + button ---- */
  .ring-wrap{
    position: relative;
    width: 210px; height: 210px;
    margin: 0 auto 18px;
    display: flex; align-items: center; justify-content: center;
  }
  .progress-ring{ position: absolute; inset: 0; transform: rotate(-90deg); }
  .ring-bg{ fill: none; stroke: rgba(255,255,255,0.08); stroke-width: 10; }
  .ring-fill{
    fill: none; stroke: var(--accent); stroke-width: 10; stroke-linecap: round;
    transition: stroke-dashoffset 0.6s cubic-bezier(.22,.9,.35,1), stroke 0.4s ease;
    filter: drop-shadow(0 0 6px rgba(56,189,248,0.7));
  }
  .ring-fill.complete{ stroke: var(--success); filter: drop-shadow(0 0 8px rgba(34,197,94,0.8)); }

  .courage-btn{
    position: relative;
    width: 142px; height: 142px;
    border-radius: 50%;
    border: none;
    cursor: pointer;
    background: radial-gradient(circle at 35% 30%, #1c3450, #0a1420 75%);
    color: var(--text);
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 0.92rem;
    line-height: 1.35;
    box-shadow: 0 0 30px rgba(56,189,248,0.35), inset 0 0 20px rgba(56,189,248,0.08);
    animation: pulse 2.4s ease-in-out infinite;
    transition: transform 0.12s ease;
  }
  .courage-btn:active{ transform: scale(0.92); }
  .courage-btn:focus-visible{ outline: 2px solid var(--accent); outline-offset: 4px; }
  @keyframes pulse{
    0%,100%{ box-shadow: 0 0 30px rgba(56,189,248,0.35), inset 0 0 20px rgba(56,189,248,0.08); }
    50%{ box-shadow: 0 0 46px rgba(56,189,248,0.55), inset 0 0 26px rgba(56,189,248,0.15); }
  }

  .floaters{ position: absolute; inset: 0; pointer-events: none; overflow: visible; }
  .floater{
    position: absolute; top: 50%;
    transform: translate(-50%, -50%);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    white-space: nowrap;
    animation: floatUp 1.5s ease-out forwards;
  }
  @keyframes floatUp{
    0%{ opacity: 0; transform: translate(-50%,-50%) translateY(0); }
    15%{ opacity: 1; }
    100%{ opacity: 0; transform: translate(-50%,-50%) translateY(-100px); }
  }

  /* ---- Confidence readout ---- */
  .confidence-readout{ text-align: center; margin-bottom: 4px; }
  .conf-num{
    font-family: 'JetBrains Mono', monospace;
    font-size: 2.5rem; font-weight: 700; color: var(--text);
  }
  .conf-pct{
    font-family: 'JetBrains Mono', monospace;
    font-size: 1.3rem; color: var(--accent);
  }
  .conf-caption{
    display: block; margin-top: -4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.65rem; letter-spacing: 0.18em;
    color: rgba(248,250,252,0.4);
  }

  .status-msg{
    text-align: center; min-height: 22px;
    font-size: 0.88rem; font-weight: 500;
    color: var(--warning);
    margin: 6px 0 18px;
    transition: color 0.3s ease;
  }

  /* ---- Stats card ---- */
  .stats-card{
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 16px;
    padding: 14px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.72rem;
  }
  .stat-row{ display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
  .stat-row:last-child{ margin-bottom: 0; }
  .stat-name{ width: 82px; flex-shrink: 0; color: rgba(248,250,252,0.7); }
  .bar-track{
    flex: 1; height: 8px; border-radius: 4px; overflow: hidden;
    background: rgba(255,255,255,0.08);
  }
  .bar-fill{ height: 100%; width: 0%; border-radius: 4px; transition: width 0.8s ease; }
  .fear-fill{ background: var(--warning); }
  .conf-fill{ background: var(--success); }
  .over-fill{ background: var(--accent); }
  .stat-pct{ width: 38px; text-align: right; flex-shrink: 0; color: rgba(248,250,252,0.55); }

  /* ============================================================
     COMPLETION OVERLAY (shown at 100%)
  ============================================================ */
  .completion{
    position: absolute; inset: 0;
    background: rgba(7,11,20,0.94);
    backdrop-filter: blur(6px);
    border-radius: 25px;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 16px; padding: 30px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.5s ease;
    z-index: 5; text-align: center;
  }
  .completion.show{ opacity: 1; visibility: visible; }
  .completion-body{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    color: var(--text);
    line-height: 1.9;
  }
  .completion-body .cbig{
    display: block;
    font-family: 'Poppins', sans-serif;
    font-size: 1.3rem; font-weight: 700;
    color: var(--success);
    margin-bottom: 4px;
  }

  .continue-btn{
    opacity: 0; transform: translateY(10px); pointer-events: none;
    transition: opacity 0.5s ease, transform 0.5s ease;
    padding: 14px 26px; border: none; border-radius: 999px;
    background: linear-gradient(135deg, var(--accent), var(--success));
    color: #04101c; font-family: 'Poppins', sans-serif;
    font-weight: 700; font-size: 0.9rem; cursor: pointer;
    animation: glowPulse 2s ease-in-out infinite;
  }
  .continue-btn.show{ opacity: 1; transform: translateY(0); pointer-events: auto; }
  .continue-btn:focus-visible{ outline: 2px solid var(--text); outline-offset: 4px; }
  @keyframes glowPulse{
    0%,100%{ box-shadow: 0 0 20px rgba(56,189,248,0.4); }
    50%{ box-shadow: 0 0 36px rgba(56,189,248,0.75); }
  }

  /* ============================================================
     HALFWAY EVENT MODAL
  ============================================================ */
  .modal-overlay{
    position: fixed; inset: 0; z-index: 50;
    background: rgba(3,6,12,0.75);
    display: flex; align-items: center; justify-content: center;
    padding: 20px;
    opacity: 0; visibility: hidden;
    transition: opacity 0.3s ease;
  }
  .modal-overlay.show{ opacity: 1; visibility: visible; }
  .modal-box{
    width: 100%; max-width: 320px;
    background: rgba(15,23,35,0.95);
    border: 1px solid rgba(56,189,248,0.4);
    border-radius: 20px;
    padding: 24px;
    text-align: center;
    box-shadow: 0 0 40px rgba(56,189,248,0.25);
    animation: modalPop 0.4s cubic-bezier(.22,.9,.35,1);
  }
  @keyframes modalPop{ from{ transform: scale(0.85); opacity: 0; } to{ transform: scale(1); opacity: 1; } }
  .modal-box .modal-title{ font-weight: 700; font-size: 1rem; margin: 0 0 10px; }
  .modal-box .modal-warning{
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; color: var(--warning);
    margin: 0 0 18px; line-height: 1.5;
  }
  .modal-box button{
    padding: 10px 22px; border: none; border-radius: 999px;
    background: var(--accent); color: #04101c;
    font-family: 'Poppins', sans-serif; font-weight: 600; font-size: 0.85rem;
    cursor: pointer;
  }
  .modal-box button:focus-visible{ outline: 2px solid var(--text); outline-offset: 3px; }

  /* ============================================================
     TOAST (achievements, easter eggs, misc feedback)
  ============================================================ */
  .toast{
    position: fixed; left: 50%; bottom: 26px; z-index: 100;
    transform: translateX(-50%) translateY(20px);
    max-width: 88%;
    background: rgba(15,23,35,0.95);
    border: 1px solid rgba(56,189,248,0.4);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem; line-height: 1.5;
    text-align: center;
    padding: 12px 20px; border-radius: 14px;
    opacity: 0; pointer-events: none;
    box-shadow: 0 10px 30px rgba(0,0,0,0.45);
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .toast.show{ opacity: 1; transform: translateX(-50%) translateY(0); }

  /* ============================================================
     ACCESSIBILITY — respect reduced motion preference
  ============================================================ */
  @media (prefers-reduced-motion: reduce){
    *, *::before, *::after{ animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
    .particles{ display: none; }
  }

  /* ---- Small screens ---- */
  @media (max-width: 360px){
    .ring-wrap{ width: 190px; height: 190px; }
    .courage-btn{ width: 128px; height: 128px; font-size: 0.85rem; }
    .conf-num{ font-size: 2.1rem; }
  }
</style>
</head>
<body>

  <!-- Animated background layers -->
  <div class="bg-gradient"></div>
  <div class="particles" id="particles"></div>

  <div class="page-wrap">
    <div class="glass-card" id="glassCard">

      <!-- ===================== INTRO TERMINAL ===================== -->
      <div class="terminal" id="terminal">
        <div class="terminal-dots">
          <span class="red"></span><span class="yellow"></span><span class="green"></span>
        </div>
        <div class="terminal-body" id="terminalBody"></div>
      </div>

      <!-- ===================== MAIN GAME UI ===================== -->
      <div class="game-ui" id="gameUi">

        <h1 class="title">Confidence Generator <span class="lightning-egg" id="lightningEgg">⚡</span></h1>
        <p class="subtitle">Help <span class="dharma-name" id="dharmaName">Dharma</span> collect enough courage to finally hit send.</p>

        <div class="ring-wrap">
          <svg class="progress-ring" viewBox="0 0 220 220" width="100%" height="100%">
            <circle class="ring-bg" cx="110" cy="110" r="95"></circle>
            <circle class="ring-fill" id="ringFill" cx="110" cy="110" r="95"></circle>
          </svg>
          <button class="courage-btn" id="courageBtn" aria-label="Generate courage">
            <span>+ Generate<br>Courage ⚡</span>
          </button>
          <div class="floaters" id="floaters"></div>
        </div>

        <div class="confidence-readout">
          <span class="conf-num" id="confNum">0</span><span class="conf-pct">%</span>
          <span class="conf-caption">CONFIDENCE</span>
        </div>

        <div class="status-msg" id="statusMsg">Still nervous 😭</div>

        <div class="stats-card">
          <div class="stat-row">
            <span class="stat-name">Fear</span>
            <div class="bar-track"><div class="bar-fill fear-fill" id="fearFill"></div></div>
            <span class="stat-pct" id="fearPct">100%</span>
          </div>
          <div class="stat-row">
            <span class="stat-name">Confidence</span>
            <div class="bar-track"><div class="bar-fill conf-fill" id="confFillBar"></div></div>
            <span class="stat-pct" id="confPctText">0%</span>
          </div>
          <div class="stat-row">
            <span class="stat-name">Overthinking</span>
            <div class="bar-track"><div class="bar-fill over-fill" id="overFill"></div></div>
            <span class="stat-pct" id="overPct">100%</span>
          </div>
        </div>

        <!-- Completion overlay reveals itself once confidence hits 100% -->
        <div class="completion" id="completion">
          <div class="completion-body" id="completionBody"></div>
          <button class="continue-btn" id="continueBtn">Open chat simulator 😂 →</button>
        </div>

      </div>
    </div>
  </div>

  <!-- ===================== HALFWAY EVENT MODAL ===================== -->
  <div class="modal-overlay" id="halfwayModal">
    <div class="modal-box">
      <p class="modal-title">Halfway there...</p>
      <p class="modal-warning">System warning: Dharma might still delete the message 💀</p>
      <button id="halfwayBtn">Don't let him 😂</button>
    </div>
  </div>

  <!-- ===================== TOAST ===================== -->
  <div class="toast" id="toast"></div>

<script>
(function(){
  "use strict";

  /* ============================================================
     ELEMENT REFERENCES
  ============================================================ */
  const terminal        = document.getElementById('terminal');
  const terminalBody     = document.getElementById('terminalBody');
  const gameUi           = document.getElementById('gameUi');
  const ringFill         = document.getElementById('ringFill');
  const courageBtn       = document.getElementById('courageBtn');
  const floaters         = document.getElementById('floaters');
  const confNum          = document.getElementById('confNum');
  const statusMsg        = document.getElementById('statusMsg');
  const fearFill         = document.getElementById('fearFill');
  const confFillBar      = document.getElementById('confFillBar');
  const overFill         = document.getElementById('overFill');
  const fearPct          = document.getElementById('fearPct');
  const confPctText      = document.getElementById('confPctText');
  const overPct          = document.getElementById('overPct');
  const completion       = document.getElementById('completion');
  const completionBody   = document.getElementById('completionBody');
  const continueBtn      = document.getElementById('continueBtn');
  const halfwayModal     = document.getElementById('halfwayModal');
  const halfwayBtn       = document.getElementById('halfwayBtn');
  const lightningEgg     = document.getElementById('lightningEgg');
  const dharmaName       = document.getElementById('dharmaName');
  const toastEl          = document.getElementById('toast');
  const particlesLayer   = document.getElementById('particles');

  /* ============================================================
     STATE
  ============================================================ */
  let confidence = 0;
  let halfwayShown = false;
  let completed = false;
  let achievementUnlocked = false;
  let unlimitedMode = false;
  let clickTimestamps = [];
  let lightningClicks = 0;
  let lightningResetTimer = null;
  let toastTimer = null;

  const RING_RADIUS = 95;
  const RING_CIRCUMFERENCE = 2 * Math.PI * RING_RADIUS;

  /* ============================================================
     BACKGROUND PARTICLES — small energy motes rising upward
  ============================================================ */
  function spawnParticle(){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = 2 + Math.random() * 3;
    p.style.width = size + 'px';
    p.style.height = size + 'px';
    p.style.left = Math.random() * 100 + 'vw';
    const duration = 6 + Math.random() * 7;
    p.style.animationDuration = duration + 's';
    p.style.opacity = (0.3 + Math.random() * 0.5).toFixed(2);
    particlesLayer.appendChild(p);
    setTimeout(() => p.remove(), duration * 1000 + 200);
  }
  // Initial burst so the background isn't empty on load, then a steady drip
  for (let i = 0; i < 14; i++) setTimeout(spawnParticle, i * 160);
  setInterval(spawnParticle, 420);

  /* ============================================================
     GENERIC TYPEWRITER — used for intro + completion sequences
  ============================================================ */
  function typeLines(container, lines, onDone){
    container.innerHTML = '';
    let i = 0;
    function next(){
      if (i >= lines.length){ if (onDone) onDone(); return; }
      const lineObj = lines[i];
      const div = document.createElement('div');
      div.className = 'term-line' + (lineObj.cls ? ' ' + lineObj.cls : '');
      container.appendChild(div);
      let charIndex = 0;
      function typeChar(){
        if (charIndex <= lineObj.text.length){
          div.textContent = lineObj.text.slice(0, charIndex);
          charIndex++;
          setTimeout(typeChar, 22);
        } else {
          i++;
          setTimeout(next, lineObj.delay || 500);
        }
      }
      typeChar();
    }
    next();
  }

  /* ============================================================
     INTRO SEQUENCE
  ============================================================ */
  const introLines = [
    { text: "Opening confidence_generator.exe ⚡", delay: 700 },
    { text: "Previous attempt failed...", delay: 450 },
    { text: "Reason: Overthinking overload 💀", delay: 900 },
    { text: "Manual confidence boost required", delay: 700 }
  ];

  typeLines(terminalBody, introLines, () => {
    terminal.classList.add('fade-out');
    setTimeout(() => {
      terminal.style.display = 'none';
      gameUi.classList.add('visible');
      setRing(0);
      updateStats(0);
    }, 500);
  });

  /* ============================================================
     RING + NUMBER HELPERS
  ============================================================ */
  ringFill.style.strokeDasharray = RING_CIRCUMFERENCE.toFixed(2);
  ringFill.style.strokeDashoffset = RING_CIRCUMFERENCE.toFixed(2);

  function setRing(pct){
    const offset = RING_CIRCUMFERENCE * (1 - pct / 100);
    ringFill.style.strokeDashoffset = offset.toFixed(2);
    ringFill.classList.toggle('complete', pct >= 100);
  }

  function animateNumber(from, to){
    const duration = 500;
    const start = performance.now();
    function step(now){
      const t = Math.min(1, (now - start) / duration);
      confNum.textContent = Math.round(from + (to - from) * t);
      if (t < 1) requestAnimationFrame(step);
    }
    requestAnimationFrame(step);
  }

  /* ============================================================
     STATUS MESSAGE (per confidence range)
  ============================================================ */
  function updateStatusMessage(pct){
    let text, color;
    if (pct >= 100){ text = "Courage collected successfully ✔"; color = 'var(--success)'; }
    else if (pct >= 80){ text = "Overthinking losing control 😂"; color = 'var(--warning)'; }
    else if (pct >= 60){ text = "Almost ready..."; color = 'var(--accent)'; }
    else if (pct >= 40){ text = "Confidence slowly loading ⚡"; color = 'var(--accent)'; }
    else if (pct >= 20){ text = "Okay... progress detected"; color = 'var(--warning)'; }
    else { text = "Still nervous 😭"; color = 'var(--warning)'; }
    statusMsg.textContent = text;
    statusMsg.style.color = color;
  }

  /* ============================================================
     STATS PANEL — Fear/Confidence/Overthinking bars
     Fear: 100% -> 20%   Confidence: 0% -> 100%   Overthinking: 100% -> 40%
  ============================================================ */
  function updateStats(pct){
    const fear = 100 - pct * 0.8;
    const overthinking = 100 - pct * 0.6;
    fearFill.style.width = fear + '%';
    confFillBar.style.width = pct + '%';
    overFill.style.width = overthinking + '%';
    fearPct.textContent = Math.round(fear) + '%';
    confPctText.textContent = Math.round(pct) + '%';
    overPct.textContent = Math.round(overthinking) + '%';
  }

  /* ============================================================
     FLOATING XP TEXT
  ============================================================ */
  const floatMessages = [
    "+10 courage",
    "-5 overthinking",
    "Fear.exe weakening",
    "Confidence updated",
    "Still easier than saying hi apparently 💀"
  ];
  function spawnFloatingText(){
    const span = document.createElement('span');
    span.className = 'floater';
    const roll = Math.random();
    span.textContent = roll < 0.1 ? "Rare confidence moment unlocked ✨"
                                    : floatMessages[Math.floor(Math.random() * floatMessages.length)];
    const xOffset = Math.round(Math.random() * 80 - 40);
    span.style.left = `calc(50% + ${xOffset}px)`;
    floaters.appendChild(span);
    setTimeout(() => span.remove(), 1600);
  }

  /* ============================================================
     TOAST
  ============================================================ */
  function showToast(html){
    toastEl.innerHTML = html;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 2600);
  }

  /* ============================================================
     HALFWAY EVENT (~50%)
  ============================================================ */
  function openModal(modal){ modal.classList.add('show'); }
  function closeModal(modal){ modal.classList.remove('show'); }

  halfwayBtn.addEventListener('click', () => {
    closeModal(halfwayModal);
    showToast("Disaster avoided... for now 😂");
  });

  /* ============================================================
     COMPLETION SEQUENCE (100%)
  ============================================================ */
  function startCompletionSequence(){
    completion.classList.add('show');
    const lines = [
      { text: "MISSION COMPLETE ⚡", cls: 'cbig', delay: 600 },
      { text: "Courage collected.", delay: 500 },
      { text: "Ready to attempt conversation.", delay: 900 },
      { text: "But first...", delay: 600 },
      { text: "Let's see what normally happens when Dharma tries texting 😭", delay: 400 }
    ];
    typeLines(completionBody, lines, () => {
      continueBtn.classList.add('show');
    });
  }

  continueBtn.addEventListener('click', () => {
    window.location.href = 'chat.html';
  });

  /* ============================================================
     MAIN BUTTON — GENERATE COURAGE
  ============================================================ */
  courageBtn.addEventListener('click', () => {
    const now = Date.now();
    clickTimestamps.push(now);
    clickTimestamps = clickTimestamps.filter(t => now - t < 1500);

    let achievementJustUnlocked = false;
    if (clickTimestamps.length >= 6 && !achievementUnlocked){
      achievementUnlocked = true;
      achievementJustUnlocked = true;
      showToast("🏆 Achievement unlocked:<br>Speed confidence booster ⚡");
    }

    if (confidence >= 100){
      if (!achievementJustUnlocked) showToast("Confidence already full bro 😭");
      return;
    }

    const gains = [8, 12, 15];
    let gain = gains[Math.floor(Math.random() * gains.length)];
    if (unlimitedMode) gain *= 2;

    const prev = confidence;
    confidence = Math.min(100, confidence + gain);

    animateNumber(prev, confidence);
    setRing(confidence);
    updateStats(confidence);
    updateStatusMessage(confidence);
    spawnFloatingText();

    if (prev < 50 && confidence >= 50 && !halfwayShown){
      halfwayShown = true;
      setTimeout(() => openModal(halfwayModal), 400);
    }

    if (confidence >= 100 && !completed){
      completed = true;
      setTimeout(startCompletionSequence, 700);
    }
  });

  /* ============================================================
     EASTER EGG 1 — tap the lightning emoji 5x fast
  ============================================================ */
  lightningEgg.addEventListener('click', (e) => {
    e.stopPropagation();
    lightningClicks++;
    clearTimeout(lightningResetTimer);
    lightningResetTimer = setTimeout(() => { lightningClicks = 0; }, 3000);

    if (lightningClicks >= 5){
      lightningClicks = 0;
      if (!unlimitedMode){
        unlimitedMode = true;
        document.body.classList.add('flash');
        setTimeout(() => document.body.classList.remove('flash'), 400);
        showToast("Unlimited confidence mode activated ⚡");
      }
    }
  });

  /* ============================================================
     EASTER EGG 2 — tap Dharma's name
  ============================================================ */
  dharmaName.addEventListener('click', () => {
    showToast("Confidence outside: 100%<br>Confidence here: complicated 💀");
  });

})();
</script>
</body>
</html>
